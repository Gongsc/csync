name: CSync
options:
  deploymentTarget:
    macOS: "14.0"
settings:
  base:
    SWIFT_VERSION: "6.0"
    PRODUCT_BUNDLE_IDENTIFIER: com.gongsc.CSync
    CURRENT_PROJECT_VERSION: 1
    MARKETING_VERSION: 1.0.0
    GENERATE_INFOPLIST_FILE: NO
    INFOPLIST_FILE: CSync/Info.plist
targets:
  CSync:
    type: application
    platform: macOS
    sources:
      - path: Sources/CSync
      - path: CSync/Assets.xcassets
        buildPhase: resources
    settings:
      base:
        PRODUCT_NAME: CSync
        MACOSX_DEPLOYMENT_TARGET: "14.0"
        CODE_SIGN_STYLE: Automatic
schemes:
  CSync:
    build:
      targets:
        CSync: all
    run:
      config: Debug
    archive:
      config: Release
